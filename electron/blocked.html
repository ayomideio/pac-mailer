<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pac Mailer — Access Denied</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f1117;
        color: #e8eaef;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .card {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 12px;
      }
      p {
        color: #8b93a7;
        line-height: 1.6;
        font-size: 14px;
        margin-bottom: 24px;
      }
      .developer {
        color: #4f7cff;
        font-weight: 600;
      }
      button {
        background: #4f7cff;
        color: #fff;
        border: none;
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #6b92ff; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🔒</div>
      <h1>Access Unavailable</h1>
      <p id="message">Support has expired. Contact Developer Pac.</p>
      <p>— <span class="developer">Developer Pac</span></p>
      <button type="button" id="quit">Close</button>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const msg = params.get('m');
      if (msg) document.getElementById('message').textContent = decodeURIComponent(msg);
      document.getElementById('quit').addEventListener('click', () => {
        if (window.pacMailer?.quit) window.pacMailer.quit();
        else window.close();
      });
    </script>
  </body>
</html>
